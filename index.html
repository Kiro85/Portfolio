<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <script src="js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js" defer></script>
</head>

<body class="u-bg-background">
    <main>
        <!-- HERO -->
        <section class="hero d-flex flex-column justify-content-center align-items-center" id="hero">
            <div class="hero-content text-center">
                <p class="u-text-primary text-uppercase">Welcome</p>
                <h1 class="u-text-on-background mb-4">Hi, I'm <span class="u-text-primary hero-name">Cristian</span>
                </h1>
                <p class="u-p-lg u-text-on-surface mb-5 mx-auto">Creative <span class="u-text-primary u-h3">web
                        developer</span></p>
                <div class="d-flex gap-3 justify-content-center flex-wrap mb-5">
                    <a href="#skills" class="btn btn-primary btn-lg fw-bold text-uppercase">View my work</a>
                    <a class="btn btn-outline-light btn-lg fw-bold text-uppercase">Download CV</a>
                </div>
            </div>
            <div class="hero-scroll-indicator position-absolute bottom-0 d-flex flex-column align-items-center mb-5">
                <p class="u-p-sm text-uppercase">Scroll for more</p>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </section>

        <!-- NAV -->
        <div class="nav-sentinel"></div>
        <nav class="navbar navbar-expand-sm u-bg-surface sticky-top">
            <div class="container-fluid justify-content-end">
                <button class="navbar-toggler u-bg-primary" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end text-end" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link u-text-on-background" href="#hero">Home</a>
                        <a class="nav-link u-text-on-background" href="#skills">About</a>
                        <a class="nav-link u-text-on-background" href="#projects">Projects</a>
                        <a class="nav-link u-text-on-background" href="#contact">Contact</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- SKILLS -->
        <section class="skills d-flex flex-column align-items-center py-5" id="skills">
            <h2 id="skillsTitle" class="my-5"></h2>
            <div class="container py-5">
                <div id="skillsCards" class="row g-4 justify-content-center">
            </div>
        </section>

        <!-- PROJECTS -->
        <section class="projects py-5" id="projects">
            <h2 id="projectsTitle" class="text-center my-5"></h2>
            <div id="projectsContainer" class="container"></div>
        </section>

        <!-- CONTACT -->
        <section class="contact w-100 d-flex justify-content-center py-5 mt-5" id="contact">
            <div class="container contact-wrapper mb-5">
                <h2 class="text-center mb-5">Contact Me</h2>
                <div class="contact-form">
                    <form class="d-flex flex-column gap-4" id="contactForm">
                        <div>
                            <label for="contactName" class="form-label u-p fw-bold">Name</label>
                            <input type="text" class="form-control contact-input u-p" id="contactName"
                                placeholder="Your Name" required>
                        </div>
                        <div>
                            <label for="contactEmail" class="form-label u-p fw-bold">Email</label>
                            <input type="email" class="form-control contact-input u-p" id="contactEmail"
                                placeholder="your@email.com" required>
                        </div>
                        <div>
                            <label for="contactMessage" class="form-label u-p fw-bold">Message</label>
                            <textarea class="form-control u-p contact-textarea" id="contactMessage" rows="5"
                                placeholder="Type your message..." required></textarea>
                        </div>
                        <button id="contactSubmit" type="submit" class="btn btn-outline-light btn-submit mx-auto">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="u-bg-surface py-4">
        <div class="container">
            <div class="d-flex flex-column align-items-center w-25 mx-auto">
                <div class="col-12 col-md-6 text-center text-md-end">
                    <div class="d-flex gap-4 justify-content-center">
                        <a href="https://github.com/kiro85" target="_blank"
                            class="footer-link text-decoration-none d-flex align-items-center gap-2">
                            <svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                            </svg>
                        </a>
                        <a href="mailto:cristianpj0808@gmail.com"
                            class="footer-link text-decoration-none d-flex align-items-center gap-2">
                            <svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
